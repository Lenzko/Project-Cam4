<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freezer LED Scanner Final</title>
    <script src="https://docs.opencv.org/4.x/opencv.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; text-align: center; }
        .camera-box { position: relative; width: 90%; max-width: 500px; margin: auto; }
        video { width: 100%; border: 2px solid #555; }
        #canvas { width: 90%; max-width: 400px; background: #000; border: 2px solid #ff0000; margin-top: 10px; }
        .btn-start { padding: 20px 40px; font-size: 20px; background: #00ff00; border: none; border-radius: 10px; cursor: pointer; margin: 20px; }
        #hasil { font-size: 40px; font-weight: bold; color: #00ff00; }
    </style>
</head>
<body>
    <h2>Freezer Scanner</h2>
    <div class="camera-box">
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <div id="hasil">Menunggu...</div>
    <button class="btn-start" onclick="init()">Mulai Scan</button>
    
    <p>Debug (Apa yang dilihat komputer):</p>
    <canvas id="canvas"></canvas>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbyxDPqH1P4Z6H-blQ9zTSOVVSIrP3QoHv8XzRFIwmfb4UbW1FYDfpVjD3-Ul19vmJZt/exec";
        let video = document.getElementById("video");
        let canvas = document.getElementById("canvas");

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                await video.play();
                document.querySelector('.btn-start').style.display = 'none';
                setInterval(processLoop, 2000); // Scan tiap 2 detik
            } catch (e) { alert("Kamera gagal: " + e); }
        }

        function processLoop() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            // 1. Setup ROI (Area yang difokuskan saja)
            let src = cv.imread(video);
            let x = src.cols * 0.35, y = src.rows * 0.40, w = src.cols * 0.30, h = src.rows * 0.20;
            let crop = src.roi(new cv.Rect(x, y, w, h));

            // 2. Preprocessing & Denoising
            let gray = new cv.Mat();
            cv.cvtColor(crop, gray, cv.COLOR_RGBA2GRAY);
            let thresh = new cv.Mat();
            cv.threshold(gray, thresh, 130, 255, cv.THRESH_BINARY_INV);

            // PENTING: Hapus noise kecil (simbol derajat)
            let kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
            cv.morphologyEx(thresh, thresh, cv.MORPH_OPEN, kernel);

            // 3. Deteksi
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let digits = [];
            for (let i = 0; i < contours.size(); i++) {
                let rect = cv.boundingRect(contours.get(i));
                // Hanya ambil objek yang tinggi (mengabaikan titik kecil)
                if (rect.height > h * 0.4) {
                    digits.push(rect);
                }
            }

            // Visualisasi Debug
            cv.imshow("canvas", thresh);

            // 4. Sederhanakan hasil (Jika deteksi > 0)
            if (digits.length >= 2) {
                let suhu = "-95"; // Contoh: Logika Anda harus menggabungkan digits.length
                document.getElementById("hasil").innerText = "Suhu: " + suhu + "°C";
                kirim(suhu);
            }

            // Cleanup memory
            src.delete(); crop.delete(); gray.delete(); thresh.delete(); kernel.delete(); contours.delete(); hierarchy.delete();
        }

        function kirim(val) {
            let p = new URLSearchParams();
            p.append("suhu", val);
            p.append("waktu", new Date().toLocaleString());
            fetch(SHEET_URL, { method: "POST", mode: "no-cors", body: p });
        }
    </script>
</body>
</html>
