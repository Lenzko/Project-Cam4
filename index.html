<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro</title>
    <script src="https://docs.opencv.org/4.x/opencv.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .camera-container { position: relative; width: 100%; max-width: 500px; margin: auto; }
        /* PENTING: Video harus terlihat */
        video { width: 100%; border: 2px solid #555; display: block; }
        #canvas { width: 100%; max-width: 500px; border: 2px solid #ff0000; margin-top: 10px; }
        .btn-start { padding: 20px 40px; font-size: 20px; background: #00ff00; border: none; border-radius: 10px; cursor: pointer; margin: 20px; }
        #hasil { font-size: 30px; margin: 10px; color: #00ff00; }
    </style>
</head>
<body>
    <h2>Freezer Scanner</h2>
    
    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <button class="btn-start" onclick="init()">Mulai Scanner</button>
    
    <div id="hasil">Suhu: -</div>
    <div id="status">Siap</div>
    
    <div>Debug:</div>
    <canvas id="canvas"></canvas>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbyxDPqH1P4Z6H-blQ9zTSOVVSIrP3QoHv8XzRFIwmfb4UbW1FYDfpVjD3-Ul19vmJZt/exec";
        let video = document.getElementById("video");
        let canvas = document.getElementById("canvas");
        let hasil = document.getElementById("hasil");
        let status = document.getElementById("status");

        async function init() {
            try {
                // 1. Minta izin kamera
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                
                video.srcObject = stream;
                
                // 2. Wajib play() untuk menghindari layar hitam
                await video.play();
                
                status.innerHTML = "✅ Kamera Aktif!";
                document.querySelector('.btn-start').style.display = 'none';

                // 3. Jalankan loop scan (tidak buka-tutup kamera)
                setInterval(scanFrame, 2000); 
                
            } catch (err) {
                alert("Gagal akses kamera: " + err);
                status.innerHTML = "❌ Error: " + err;
            }
        }

        function scanFrame() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            let src = cv.imread(video);
            let gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            
            // Adaptive Threshold agar angka lebih jelas
            let thresh = new cv.Mat();
            cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

            cv.imshow("canvas", thresh);
            
            // LOGIKA SEDERHANA: Ambil angka (Placeholder - Sesuaikan dengan deteksi konturmu)
            let suhu = "-79"; 
            hasil.innerHTML = "Suhu: " + suhu + "°C";
            
            // Kirim data
            kirim(suhu);

            src.delete(); gray.delete(); thresh.delete();
        }

        function kirim(suhu) {
            let params = new URLSearchParams();
            params.append("suhu", suhu);
            params.append("waktu", new Date().toLocaleString("id-ID"));
            
            fetch(SHEET_URL, {
                method: "POST",
                mode: "no-cors",
                body: params
            });
        }
    </script>
</body>
</html>
