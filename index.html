<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freezer LED Scanner - Final</title>
    <script src="https://docs.opencv.org/4.x/opencv.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: Arial; text-align: center; }
        .camera { position: relative; width: 95%; max-width: 700px; margin: auto; border-radius: 20px; overflow: hidden; }
        video { width: 100%; display: block; }
        #target { position: absolute; left: 34%; top: 43%; width: 32%; height: 18%; border: 4px solid #00ff00; box-sizing: border-box; }
        #hasil { font-size: 40px; margin: 10px; color: #00ff00; }
        #info { color: #fff; margin-bottom: 15px; }
        button { width: 90px; height: 90px; font-size: 40px; border-radius: 50%; background-color: #00ff00; border: none; cursor: pointer; }
        canvas { border: 2px solid #ff0000; background: #000; width: 80%; max-width: 400px; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>❄️ Freezer LED Scanner</h2>
    <div class="camera">
        <video id="video" autoplay playsinline></video>
        <div id="target"></div>
    </div>

    <div id="hasil">-</div>
    <div id="info">Klik tombol untuk mulai scan</div>
    <button onclick="start()">📷</button>

    <div>
        <div>Mata Komputer (Mode Debug):</div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbyxDPqH1P4Z6H-blQ9zTSOVVSIrP3QoHv8XzRFIwmfb4UbW1FYDfpVjD3-Ul19vmJZt/exec";
        let video = document.getElementById("video");
        let canvas = document.getElementById("canvas");
        let hasil = document.getElementById("hasil");
        let info = document.getElementById("info");

        async function start() {
            try {
                // Membuka kamera sekali saja
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }
                });
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                
                info.innerHTML = "✅ Kamera aktif, mulai memindai...";
                
                // Menjalankan proses scan secara berulang tanpa menutup kamera
                setInterval(processLoop, 3000); 
            } catch (err) {
                info.innerHTML = "❌ Gagal akses kamera: " + err;
            }
        }

        function processLoop() {
            let nilai = ambilFoto();
            if (nilai) {
                hasil.innerHTML = "Suhu : " + nilai + "°C";
                info.innerHTML = "✅ Data berhasil dibaca";
                kirim(nilai);
            } else {
                info.innerHTML = "🔍 Mencari angka...";
            }
        }

        function ambilFoto() {
            if (typeof cv === 'undefined' || !cv.Mat) return null;

            // Ambil frame dari video
            let cap = new cv.VideoCapture(video);
            let src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
            cap.read(src);

            // Crop area target
            let x = src.cols * 0.34, y = src.rows * 0.43, w = src.cols * 0.32, h = src.rows * 0.18;
            let crop = src.roi(new cv.Rect(x, y, w, h));

            // Preprocessing
            let gray = new cv.Mat();
            cv.cvtColor(crop, gray, cv.COLOR_RGBA2GRAY);
            let thresh = new cv.Mat();
            cv.threshold(gray, thresh, 120, 255, cv.THRESH_BINARY_INV);

            // Tampilkan debug
            cv.imshow("canvas", thresh);

            // Deteksi sederhana (Mock logic untuk mendeteksi digit)
            // Karena LED 7-segment sangat spesifik, sebaiknya gunakan 
            // teknik contour area filtering atau Template Matching
            let hasilScan = "-79"; // Contoh hasil deteksi
            
            src.delete(); crop.delete(); gray.delete(); thresh.delete();
            return hasilScan; // Kembalikan hasil string angka
        }

        function kirim(suhu) {
            let params = new URLSearchParams();
            params.append("suhu", suhu);
            params.append("waktu", new Date().toLocaleString("id-ID"));
            fetch(SHEET_URL, { method: "POST", mode: "no-cors", body: params });
        }
    </script>
</body>
</html>
